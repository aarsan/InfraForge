<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfraForge Badge</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  .badge-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .badge {
    width: 340px;
    height: 480px;
    background: linear-gradient(180deg, #0d1117 0%, #161b22 40%, #0d1117 100%);
    border-radius: 16px;
    border: 2px solid #30363d;
    box-shadow:
      0 0 40px rgba(57, 210, 192, 0.15),
      0 0 80px rgba(88, 166, 255, 0.08),
      0 20px 60px rgba(0, 0, 0, 0.5);
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  /* Top accent bar */
  .badge::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #39d2c0, #58a6ff, #bc8cff);
  }

  /* Lanyard hole */
  .lanyard-hole {
    width: 40px;
    height: 20px;
    background: #1a1a2e;
    border-radius: 0 0 20px 20px;
    border: 2px solid #30363d;
    border-top: none;
    margin-top: 0;
    position: relative;
    z-index: 2;
  }

  .lanyard-hole::after {
    content: '';
    width: 12px;
    height: 12px;
    background: transparent;
    border: 2px solid #484f58;
    border-radius: 50%;
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
  }

  /* Logo section */
  .logo-section {
    margin-top: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .logo-icon {
    font-size: 52px;
    filter: drop-shadow(0 0 12px rgba(57, 210, 192, 0.4));
    line-height: 1;
  }

  .logo-text {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, #39d2c0, #58a6ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }

  .logo-tagline {
    font-size: 9px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    font-weight: 600;
  }

  /* Divider */
  .divider {
    width: 80%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #30363d, transparent);
    margin: 20px 0;
  }

  /* Photo placeholder */
  .photo-area {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: linear-gradient(135deg, #21262d, #161b22);
    border: 3px solid #39d2c0;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 20px rgba(57, 210, 192, 0.2);
    overflow: hidden;
  }

  .photo-area svg {
    width: 50px;
    height: 50px;
    fill: #484f58;
  }

  /* Name & title */
  .name-section {
    margin-top: 16px;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .badge-name {
    font-size: 22px;
    font-weight: 700;
    color: #f0f6fc;
    letter-spacing: -0.3px;
  }

  .badge-title {
    font-size: 13px;
    font-weight: 600;
    color: #39d2c0;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .badge-dept {
    font-size: 11px;
    color: #8b949e;
    font-weight: 500;
  }

  /* Access level badge */
  .access-level {
    margin-top: auto;
    margin-bottom: 24px;
    padding: 6px 24px;
    background: linear-gradient(135deg, rgba(57, 210, 192, 0.15), rgba(88, 166, 255, 0.15));
    border: 1px solid rgba(57, 210, 192, 0.3);
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    color: #39d2c0;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* Print instructions */
  .print-note {
    color: #8b949e;
    font-size: 13px;
    text-align: center;
    max-width: 340px;
    line-height: 1.5;
  }

  .print-note kbd {
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 4px;
    padding: 2px 6px;
    font-family: inherit;
    font-size: 12px;
    color: #c9d1d9;
  }

  @media print {
    body { background: white; }
    .badge {
      box-shadow: none;
      border: 2px solid #ccc;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .print-note { display: none; }
  }
</style>
</head>
<body>
  <div class="badge-container">
    <div class="badge">
      <div class="lanyard-hole"></div>

      <div class="logo-section">
        <div class="logo-icon">⚒️</div>
        <div class="logo-text">InfraForge</div>
        <div class="logo-tagline">Self-Service Infrastructure Platform</div>
      </div>

      <div class="divider"></div>

      <div class="photo-area">
        <!-- Person silhouette -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.33 0-10 1.67-10 5v2h20v-2c0-3.33-6.67-5-10-5z"/>
        </svg>
      </div>

      <div class="name-section">
        <div class="badge-name">IT Manager</div>
        <div class="badge-title">Platform Engineering</div>
        <div class="badge-dept">Cloud Infrastructure Division</div>
      </div>

      <div class="access-level">Full Access</div>
    </div>

    <p class="print-note">
      Open in browser → right-click → <kbd>Save image as…</kbd> or <kbd>Ctrl+P</kbd> to print.<br>
      Sized for standard badge holders (3.4" × 4.8").
    </p>
  </div>
</body>
</html>
